<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i五院 图标方案预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  background: #f0f2f5; 
  padding: 40px 20px;
  color: #1a1a1a;
}
h1 { text-align: center; font-size: 28px; margin-bottom: 8px; font-weight: 700; }
.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 48px; }

.scheme { 
  max-width: 600px; 
  margin: 0 auto 60px; 
  background: white; 
  border-radius: 20px; 
  padding: 36px 32px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
}
.scheme-title { 
  font-size: 20px; 
  font-weight: 700; 
  margin-bottom: 6px;
}
.scheme-desc { 
  font-size: 13px; 
  color: #888; 
  margin-bottom: 32px;
  line-height: 1.6;
}
.icon-row { 
  display: flex; 
  justify-content: space-between; 
  gap: 12px;
}
.icon-item { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: 10px;
  flex: 1;
}
.icon-box { 
  width: 56px; 
  height: 56px; 
  border-radius: 16px; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.icon-label { 
  font-size: 12px; 
  color: #555; 
  text-align: center;
  white-space: nowrap;
}

/* === SCHEME A: 医疗蓝调 — 单色渐变 + 毛玻璃 === */
.scheme-a .icon-box {
  background: linear-gradient(135deg, rgba(21,101,192,0.08) 0%, rgba(21,101,192,0.15) 100%);
  backdrop-filter: blur(10px);
}
.scheme-a .icon-box svg {
  filter: drop-shadow(0 1px 2px rgba(21,101,192,0.15));
}

/* === SCHEME B: 科技双色 — 主色+辅助色立体感 === */
.scheme-b .icon-box {
  background: #f5f5f5;
  border-radius: 50%;
  width: 56px;
  height: 56px;
}

/* Bottom nav preview */
.nav-preview {
  margin-top: 36px;
  padding-top: 20px;
  border-top: 1px solid #eee;
}
.nav-preview-title {
  font-size: 13px;
  color: #999;
  margin-bottom: 16px;
}
.nav-row {
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-radius: 12px;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.nav-item span {
  font-size: 10px;
}
.nav-item.active span { font-weight: 600; }

/* Scheme A nav */
.scheme-a .nav-row {
  background: linear-gradient(180deg, rgba(21,101,192,0.03) 0%, rgba(21,101,192,0.06) 100%);
}
.scheme-a .nav-item span { color: #999; }
.scheme-a .nav-item.active span { color: #1565C0; }

/* Scheme B nav */
.scheme-b .nav-row {
  background: linear-gradient(180deg, #fafbfc 0%, #f0f4f8 100%);
}
.scheme-b .nav-item span { color: #999; }
.scheme-b .nav-item.active span { color: #00897B; }
</style>
</head>
<body>

<h1>i五院 图标设计方案</h1>
<p class="subtitle">两套方案 × 5个代表图标 + 底部导航栏</p>

<!-- ========== SCHEME A ========== -->
<div class="scheme scheme-a">

          <rect x="9" y="16" width="12" height="2" rx="1" fill="white" opacity="0.6"/>

            </linearGradient>

          <rect x="5" y="6" width="22" height="7" rx="4" fill="#1565C0"/>

          <rect x="9" y="16" width="4" height="3" rx="1" fill="white" opacity="0.8"/>
          <rect x="14.5" y="16" width="4" height="3" rx="1" fill="white" opacity="0.5"/>

          <rect x="9" y="21" width="4" height="3" rx="1" fill="white" opacity="0.5"/>

        </svg>

  </div>

  <!-- Bottom nav preview -->

      <div class="nav-item active">

</div>
